{% if latest_question_list %}
    <ul>
    {% for question in latest_question_list %}
        <li><a href="{% url 'polls:detail' question.id %}">{{ question.question_text }}</a></li>
        <p>
            <a href="{% url 'polls:update' question.id %}">Actualizar pregunta</a>
            <a href="{% url 'polls:delete' question.id %}">Eliminar pregunta</a>
        </p>
    {% endfor %}
    </ul>
{% else %}
    <p>No polls are available.</p>
{% endif %}

<p><a href="{% url 'polls:create' %}">Crear pregunta</a></p>
